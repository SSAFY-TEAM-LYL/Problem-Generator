# Alembic 설정 — 파이프라인이 공유 DB(PostgreSQL) 스키마/마이그레이션을 소유한다.
# DB URL 은 보안상 여기 적지 않고 환경변수 IPE_DB_URL 로 주입한다 (env.py 가 읽음).
#   예: export IPE_DB_URL="postgresql+psycopg://user:pw@host:5432/bank"
#   적용: alembic upgrade head   /   생성: alembic revision --autogenerate -m "msg"
[alembic]
script_location = ipe/v2/db/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
